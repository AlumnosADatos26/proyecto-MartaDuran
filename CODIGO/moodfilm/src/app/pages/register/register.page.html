<ion-content class="register-content">

  <div class="register-container">

    <div class="register-header">
      <div>(logo)</div>
      <h1 class="app-title">MoodFilm</h1>
      <p class="app-subtitle">Crea tu cuenta y empieza tu diario cinéfilo</p>
    </div>

    <div class="register-form">

      <div class="input-group">
        <ion-icon name="person-outline" class="input-icon"></ion-icon>
        <ion-input type="text" placeholder="Nombre de usuario" [(ngModel)]="username" class="custom-input">
        </ion-input>
      </div>

      <div class="input-group">
        <ion-icon name="mail-outline" class="input-icon"></ion-icon>
        <ion-input type="email" placeholder="Correo electrónico" [(ngModel)]="email" class="custom-input">
        </ion-input>
      </div>

      <div class="input-group">
        <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>
        <ion-input type="password" placeholder="Contraseña" [(ngModel)]="password" class="custom-input">
        </ion-input>
      </div>

      <div class="input-group">
        <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>
        <ion-input type="password" placeholder="Repetir contraseña" [(ngModel)]="passwordRepeat" class="custom-input">
        </ion-input>
      </div>

      <p class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </p>

      <ion-button expand="block" class="btn-register" (click)="register()">
        Crear cuenta
      </ion-button>

    </div>

    <div class="login-link">
      <span>¿Ya tienes cuenta?</span>
      <a (click)="goToLogin()">Inicia sesión</a>
    </div>

  </div>

</ion-content>

<ion-content class="login-content">

  <div class="login-container">

    <div class="login-header">
      <div class="logo">(aqui irá el logo)</div>
      <h1 class="app-title">MoodFilm</h1>
      <p class="app-subtitle">Encuentra la película perfecta para tu estado de ánimo</p>
    </div>

    <div class="login-form">

      <div class="input-group">
        <ion-icon name="mail-outline" class="input-icon"></ion-icon>
        <ion-input type="email" placeholder="Correo electrónico" [(ngModel)]="email" class="custom-input">
        </ion-input>
      </div>

      <div class="input-group">
        <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>
        <ion-input type="password" placeholder="Contraseña" [(ngModel)]="password" class="custom-input">
        </ion-input>
      </div>

      <ion-button expand="block" class="btn-login" (click)="login()">
        Iniciar sesión
      </ion-button>

      <div class="separator">
        <span class="separator-line"></span>
        <span class="separator-text">o</span>
        <span class="separator-line"></span>
      </div>

      <ion-button expand="block" fill="outline" class="btn-google" (click)="loginGoogle()">
        <img src="assets/img/google-icon.png" alt="Google" class="google-icon" />
        Continuar con Google
      </ion-button>

      <ion-button expand="block" fill="clear" class="btn-guest" (click)="loginGuest()">
        Entrar como invitado
      </ion-button>

    </div>

    <div class="register-link">
      <span>¿No tienes cuenta?</span>
      <a (click)="goToRegister()">Regístrate</a>
    </div>

  </div>

</ion-content>
